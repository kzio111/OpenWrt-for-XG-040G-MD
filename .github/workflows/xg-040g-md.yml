name: Build ImmortalWrt XG-040G-MD Firmware

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: "是否开启 SSH 远程配置 (make menuconfig)"
        required: false
        default: false
        type: boolean
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: "config/xg-040g-md.config"  # 配置文件
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git  # ImmortalWrt 的仓库
  REPO_BRANCH: master  # ImmortalWrt 分支
  CAI_REPO_URL: https://github.com/Cairongzeng/openwrt.git  # Cairongzeng 补丁仓库
  CAI_REPO_BRANCH: xg040gmd  # Cairongzeng 分支
  FEEDS_CONF: feeds.conf.default  # feeds 配置文件
  UPLOAD_FIRMWARE: true  # 是否上传固件
  UPLOAD_RELEASE: true  # 是否发布固件
  TZ: Asia/Shanghai  # 设置时区

jobs:
  build:
    runs-on: ubuntu-latest  # 使用 Ubuntu 环境构建

    steps:
      - name: Checkout ImmortalWrt repository
        uses: actions/checkout@v4  # 检出代码

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive  # 禁用交互式安装
          TZ: ${{ env.TZ }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools python3-dev rsync swig unzip libpython3-dev \
          zlib1g-dev file wget squashfs-tools mkbootimg device-tree-compiler \
          qemu-utils upx-ucl
          sudo apt update
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi

          [[ -n "$TZ" ]] && sudo timedatectl set-timezone "$TZ"

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone ImmortalWrt repository and apply XG-040G-MD patches
        run: |
          # 克隆 ImmortalWrt 仓库
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" immortalwrt
          cd patch
          # 克隆 Cairongzeng 的仓库以获取补丁
          git clone --depth 1 --branch "$CAI_REPO_BRANCH" "$CAI_REPO_URL" cairongzeng_patches

          # 动态获取内核主版本号（例如 6.12 或 6.6）
          KVER=$(grep -o 'LINUX_KARCH:=.*' ../immortalwrt/include/kernel-defaults.mk | cut -d= -f2 || echo "6.12")
          echo "检测到内核版本分支: $KVER"

          # 创建必要的目录
          mkdir -p ../immortalwrt/target/linux/airoha/an7581/base-files/etc/board.d/
          mkdir -p ../immortalwrt/target/linux/airoha/image/
          mkdir -p ../immortalwrt/target/linux/airoha/dts/
          mkdir -p ../immortalwrt/target/linux/airoha/patches-$KVER/

          # 拷贝文件和补丁
          [ -e airoha/01_leds ] && cp -fv airoha/01_leds ../immortalwrt/target/linux/airoha/an7581/base-files/etc/board.d/01_leds
          [ -e airoha/02_network ] && cp -fv airoha/02_network ../immortalwrt/target/linux/airoha/an7581/base-files/etc/board.d/02_network
          [ -e airoha/an7581.mk ] && cp -fv airoha/an7581.mk ../immortalwrt/target/linux/airoha/image/an7581.mk
          [ -e airoha/an7581-nokia_xg-040g-md.dts ] && cp -fv airoha/an7581-nokia_xg-040g-md.dts ../immortalwrt/target/linux/airoha/dts/an7581-nokia_xg-040g-md.dts
          [ -e airoha/an7581.dtsi ] && cp -fv airoha/an7581.dtsi ../immortalwrt/target/linux/airoha/dts/an7581.dtsi

          # 拉取并应用 Cairongzeng 的补丁
          if [ -d "cairongzeng_patches/patches-6.12" ]; then
            find cairongzeng_patches/patches-6.12 -name "*.patch" -exec cp -fv {} ../immortalwrt/target/linux/airoha/patches-$KVER/ \;
          fi

      - name: Update & Install feeds
        working-directory: ./immortalwrt
        run: |
          # 更新并安装 feeds
          [ -e ../$FEEDS_CONF ] && cp -fv ../$FEEDS_CONF ./feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Run DIY Script (Plugins & devmem fix)
        working-directory: ./immortalwrt
        run: |
          # 载入配置并执行自定义脚本
          cp -fv "../${CONFIG_FILE}" .config
          chmod +x ../diy.sh
          ../diy.sh

      - name: Compile ImmortalWrt firmware
        id: compile
        run: |
          # 编译固件
          cd immortalwrt
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          [[ -n "$DEVICE_NAME" ]] && echo "DEVICE_NAME=_${DEVICE_NAME}" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

          make -j$(nproc) || {
            echo "❌ 编译失败，正在输出详细错误信息..."
            make -j1 V=s
            exit 1
          }

          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt_XG-040G-MD${{ env.FILE_DATE }}
          path: immortalwrt/bin/targets/airoha/*/*

      - name: Publish Release
        uses: ncipollo/release-action@v1
        if: steps.compile.outputs.status == 'success'
        with:
          tag: Build_${{ env.FILE_DATE }}
          artifacts: immortalwrt/bin/targets/airoha/*/*
          body: |
            🚀 XG-040G-MD 固件构建完成
            内置: CPUFreq, PWM-Airoha, TurboAcc, NPU
            调试: devmem 命令已开启
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
