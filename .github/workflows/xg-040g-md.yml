name: Build_XG_040G_MD

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: "是否开启 SSH 远程配置 (make menuconfig)"
        required: false
        default: false
        type: boolean
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default-main
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools python3-dev rsync swig unzip libpython3-dev \
          zlib1g-dev file wget squashfs-tools mkbootimg device-tree-compiler
          sudo apt update
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          # 检查 mkbootimg 是否存在 (保留你的原始逻辑)
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found!"
          fi
          [[ -n "$TZ" ]] && sudo timedatectl set-timezone "$TZ"

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt and apply XG-040G-MD patch files
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          cd patch
          # 强制创建所有必要的目标目录 (保留并增强了你的 mkdir 逻辑)
          mkdir -p ../openwrt/target/linux/airoha/an7581/base-files/etc/board.d/
          mkdir -p ../openwrt/target/linux/airoha/image/
          mkdir -p ../openwrt/target/linux/airoha/dts/
          mkdir -p ../openwrt/target/linux/airoha/patches-6.12/
          mkdir -p ../openwrt/target/linux/mediatek/patches-6.12/
          mkdir -p ../openwrt/target/linux/generic/pending-6.12/

          # 复制核心文件
          [ -e airoha/01_leds ] && cp -f airoha/01_leds ../openwrt/target/linux/airoha/an7581/base-files/etc/board.d/01_leds
          [ -e airoha/02_network ] && cp -f airoha/02_network ../openwrt/target/linux/airoha/an7581/base-files/etc/board.d/02_network
          [ -e airoha/an7581.mk ] && cp -f airoha/an7581.mk ../openwrt/target/linux/airoha/image/an7581.mk
          [ -e airoha/an7581-nokia_xg-040g-md.dts ] && cp -f airoha/an7581-nokia_xg-040g-md.dts ../openwrt/target/linux/airoha/dts/an7581-nokia_xg-040g-md.dts
          [ -e airoha/an7581.dtsi ] && cp -f airoha/an7581.dtsi ../openwrt/target/linux/airoha/dts/an7581.dtsi

          # 安全复制补丁
          if [ -d "airoha/patches-6.12" ]; then
            find airoha/patches-6.12 -name "*.patch" -exec cp -f {} ../openwrt/target/linux/airoha/patches-6.12/ \;
          fi
          [ -d "mediatek/patches-6.12" ] && find mediatek/patches-6.12 -name "*.patch" -exec cp -f {} ../openwrt/target/linux/mediatek/patches-6.12/ \;
          [ -d "generic/pending-6.12" ] && find generic/pending-6.12 -name "*.patch" -exec cp -f {} ../openwrt/target/linux/generic/pending-6.12/ \;

      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          [ -e ../$FEEDS_CONF ] && cp -f ../$FEEDS_CONF ./feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: Run DIY Script (Plugins & devmem fix)
        working-directory: ./openwrt
        run: |
          # 1. 载入你的基础 config
          cp -fv "../${CONFIG_FILE}" .config
          # 2. 运行脚本进行“二次装修” (关键: 解决 devmem 和插件拉取)
          chmod +x ../diy.sh
          ../diy.sh

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@main
        if: github.event.inputs.ssh == 'true'

      - name: Generate Final Config
        working-directory: ./openwrt
        run: |
          make defconfig
          [ -e .config ] && cp .config defconfig-final.config

      - name: Upload build config files
        uses: actions/upload-artifact@v4
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j8
          find dl -size -1024c -delete

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s
          else
            make -j$(nproc)
          fi
          # 提取设备名称用于 Release 文件命名
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          [[ -n "$DEVICE_NAME" ]] && echo "DEVICE_NAME=_${DEVICE_NAME}" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Prepare firmware artifacts
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          FIRMWARE_DIR=$(ls -d openwrt/bin/targets/*/* | head -1)
          cd "$FIRMWARE_DIR"
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 XG-040G-MD 固件发布
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核版本: 6.12.X
          内置插件: TurboAcc, Airoha NPU
          调试工具: devmem (全开)
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
