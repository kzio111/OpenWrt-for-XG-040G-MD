name: Build_XG_040G_MD-immortalwrt

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/xiangtailiang/openwrt.git
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 20
  KEEP_RELEASE_MARKER: "[keep-release]"
  CCACHE_DIR: /mnt/openwrt/ccache
  CCACHE_MAXSIZE: 5G
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get update
          sudo -E apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch \
            pkgconf python3 python3-pip python3-ply python3-docutils python3-setuptools \
            qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl \
            unzip vim wget xmlto xxd zlib1g-dev zstd

          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /mnt/openwrt/ccache
          sudo chown -R $USER:$USER /mnt/openwrt/ccache

      - name: Clone source code
        run: |
          git clone --depth 1 -b "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: Update feeds
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom files
        run: |
          # 复制你的配置
          cp "$CONFIG_FILE" openwrt/.config

          # 如果你仓库里有自定义 files 目录
          if [ -d files ]; then
            cp -rf files openwrt/
          fi

          # 如果你仓库里有自定义 package 目录
          if [ -d package ]; then
            cp -rf package/* openwrt/package/ || true
          fi

          # 如果你仓库里有自定义 patch 目录
          if [ -d patch ]; then
            find patch -type f | while read f; do
              rel="${f#patch/}"
              dst="openwrt/$rel"
              mkdir -p "$(dirname "$dst")"
              cp -f "$f" "$dst"
            done
          fi

      - name: Fix missing w1700k-ubi DTS build error
        working-directory: ./openwrt
        run: |
          set -e

          echo "Checking airoha image Makefile..."
          grep -n "w1700k-ubi\|an7581-w1700k-ubi" target/linux/airoha/image/Makefile || true

          # 删除 define Device/w1700k-ubi ... endef 整块
          sed -i '/^define Device\/w1700k-ubi$/,/^endef$/d' target/linux/airoha/image/Makefile

          # 删除 TARGET_DEVICES += w1700k-ubi
          sed -i '/^TARGET_DEVICES += w1700k-ubi$/d' target/linux/airoha/image/Makefile

          echo "After patch:"
          grep -n "w1700k-ubi\|an7581-w1700k-ubi" target/linux/airoha/image/Makefile || true

          # 防止 target info 缓存旧内容
          rm -f tmp/.targetinfo
          rm -f tmp/.packageinfo

      - name: Defconfig
        working-directory: ./openwrt
        run: |
          make defconfig

      - name: Download package sources
        working-directory: ./openwrt
        run: |
          make download -j$(nproc) V=s

      - name: Build firmware
        working-directory: ./openwrt
        run: |
          make -j$(nproc) V=s

      - name: Upload firmware
        if: env.UPLOAD_FIRMWARE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware_XG-040G-MD
          path: |
            openwrt/bin/targets/**/*
            !openwrt/bin/targets/**/*.buildinfo
            !openwrt/bin/targets/**/*.json
            !openwrt/bin/targets/**/*.manifest
            !openwrt/bin/targets/**/*.packages

      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Remove old releases
        if: env.UPLOAD_RELEASE == 'true'
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: ${{ env.KEEP_RELEASES }}
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release
        if: env.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          files: |
            openwrt/bin/targets/**/*
          body: |
            ${{ env.KEEP_RELEASE_MARKER }}
            Auto build for XG-040G-MD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
