name: Build_XG_040G_MD_OpenWrt_25_12

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - ".github/workflows/xg-040g-md-openwrt-25.12.yml"
      - "config/**"
      - "scripts/**"
      - "feeds.conf.default"
      - "files/**"
      - "package/**"
      - "patch/**"

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/xiangtailiang/openwrt.git
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  KEEP_RELEASES: 20
  KEEP_RELEASE_MARKER: "[keep-release]"
  CCACHE_DIR: /mnt/openwrt/ccache
  CCACHE_MAXSIZE: 5G
  TZ: Asia/Shanghai
  DEVICE_ID: "bell_xg-040g-md"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4

      - name: 释放磁盘空间
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true

      - name: 查看磁盘占用
        run: df -h

      - name: 安装编译依赖
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo apt update
          sudo apt purge -y python3-distutils || true
          sudo apt autoremove -y
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget curl \
            mkbootimg device-tree-compiler ccache patch xxd
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "mkbootimg not found in PATH"
          fi
          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          fi

      - name: 安装 Python 构建工具
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: 拉取 OpenWrt 源码
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt

      - name: 应用 feeds.conf.default
        run: |
          if [ -f "$FEEDS_CONF" ]; then
            cp -fv "$FEEDS_CONF" openwrt/feeds.conf.default
          fi

      - name: 挪动构建目录到 /mnt/openwrt
        run: |
          sudo mkdir -p /mnt/openwrt/{dl,staging_dir,build_dir,ccache}
          sudo chown -R "$USER:$(id -gn)" /mnt/openwrt
          rm -rf openwrt/dl openwrt/staging_dir openwrt/build_dir
          ln -sfn /mnt/openwrt/dl openwrt/dl
          ln -sfn /mnt/openwrt/staging_dir openwrt/staging_dir
          ln -sfn /mnt/openwrt/build_dir openwrt/build_dir
          df -h

      - name: 恢复 dl 缓存
        uses: actions/cache@v4
        with:
          path: /mnt/openwrt/dl
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-dl-

      - name: 恢复 ccache
        uses: actions/cache/restore@v4
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v3-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v3-

      - name: 配置 ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          ccache -M "$CCACHE_MAXSIZE"
          echo "ccache dir: $CCACHE_DIR"
          ccache -s

      - name: 更新并安装 feeds
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: 安装第三方软件包
        working-directory: ./openwrt/package
        run: |
          if [ -f "$GITHUB_WORKSPACE/scripts/update-packages.sh" ]; then
            chmod +x "$GITHUB_WORKSPACE/scripts/update-packages.sh"
            bash "$GITHUB_WORKSPACE/scripts/update-packages.sh"
          else
            echo "未发现 scripts/update-packages.sh，跳过"
          fi

      - name: 覆盖自定义 files package patch
        run: |
          set -e

          if [ -d files ]; then
            echo "复制 files/"
            cp -rf files openwrt/
          fi

          if [ -d package ]; then
            echo "复制 package/"
            mkdir -p openwrt/package
            cp -rf package/* openwrt/package/ || true
          fi

          if [ -d patch ]; then
            echo "覆盖 patch/ 到源码树"
            find patch -type f | while read -r f; do
              rel="${f#patch/}"
              dst="openwrt/$rel"
              mkdir -p "$(dirname "$dst")"
              cp -f "$f" "$dst"
              echo "已覆盖: $rel"
            done
          fi

      - name: Rust LLVM 热修复
        working-directory: ./openwrt
        run: |
          sed -i 's/--set=llvm.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/' \
            feeds/packages/lang/rust/Makefile || true
          grep -n "download-ci-llvm" feeds/packages/lang/rust/Makefile || true

      - name: 修复 w1700k-ubi DTS 构建问题
        working-directory: ./openwrt
        run: |
          set -e
          if [ -f target/linux/airoha/image/Makefile ]; then
            echo "处理前检查："
            grep -n "w1700k-ubi\|an7581-w1700k-ubi" target/linux/airoha/image/Makefile || true
            sed -i '/^define Device\/w1700k-ubi$/,/^endef$/d' target/linux/airoha/image/Makefile
            sed -i '/^TARGET_DEVICES += w1700k-ubi$/d' target/linux/airoha/image/Makefile
            echo "处理后检查："
            grep -n "w1700k-ubi\|an7581-w1700k-ubi" target/linux/airoha/image/Makefile || true
          fi
          rm -f tmp/.targetinfo tmp/.packageinfo

      - name: 检查源码里是否存在 XG-040G-MD 相关定义
        working-directory: ./openwrt
        run: |
          set -e
          echo "检查源码里是否存在 XG-040G-MD 相关定义..."
          find target/linux/airoha -type f | grep -Ei 'xg-040g-md|bell' || true
          grep -RIn "bell_xg-040g-md\|XG-040G-MD" target/linux/airoha || true

          grep -RIn "^define Device/${DEVICE_ID}$" target/linux/airoha/image || {
            echo "错误：没有找到 define Device/${DEVICE_ID}"
            exit 1
          }

      - name: 复制配置并执行 defconfig
        run: |
          set -e
          cp -fv "${CONFIG_FILE}" openwrt/.config
          cd openwrt
          make defconfig
          cp .config defconfig-final.config

          echo "最终 .config 目标项："
          grep -E 'CONFIG_TARGET_airoha|CONFIG_TARGET_DEVICE|xg-040g-md|bell|evb' .config || true

          grep -q '^CONFIG_TARGET_airoha=y$' .config || {
            echo "错误：CONFIG_TARGET_airoha 未启用"
            exit 1
          }

          grep -q '^CONFIG_TARGET_airoha_an7581=y$' .config || {
            echo "错误：CONFIG_TARGET_airoha_an7581 未启用"
            exit 1
          }

          grep -q "^CONFIG_TARGET_airoha_an7581_DEVICE_${DEVICE_ID}=y$" .config || {
            echo "错误：最终 .config 没有选中 ${DEVICE_ID}"
            exit 1
          }

      - name: 上传配置文件
        uses: actions/upload-artifact@v4
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: 下载软件包源码
        working-directory: ./openwrt
        run: |
          make download -j4 V=s
          find dl -size -1024c -delete

      - name: 编译 OpenWrt 固件
        id: compile
        run: |
          cd openwrt
          echo "Disk usage before compile:"
          df -h

          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          else
            make -j"$(nproc)" || {
              echo "Compile failed, disk usage diagnostics:"
              df -h
              du -h -d1 . | sort -h | tail -n 30
              exit 1
            }
          fi

          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> "$GITHUB_ENV"
          fi
          echo "FILE_DATE=_$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "status=success" >> "$GITHUB_OUTPUT"

          echo "ccache stats (env CCACHE_DIR=$CCACHE_DIR):"
          ccache -s || true

      - name: 保存 ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: /mnt/openwrt/ccache
          key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-ccache-v3-${{ github.run_id }}

      - name: 整理发布文件
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          set -e
          mkdir -p upload

          find openwrt/bin/targets -type f \( \
            -name "*sysupgrade*.bin" -o \
            -name "*factory*.bin" -o \
            -name "*initramfs*.itb" -o \
            -name "*.fip" -o \
            -name "*preloader*.bin" \
          \) -exec cp -f {} upload/ \;

          echo "将上传以下文件："
          ls -lh upload || true

          test -n "$(ls -A upload 2>/dev/null)" || {
            echo "错误：没有找到要上传的固件文件"
            exit 1
          }

          echo "FIRMWARE=$PWD/upload" >> "$GITHUB_ENV"

      - name: 上传固件附件
        uses: actions/upload-artifact@v4
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: 生成发布标签和说明
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> "$GITHUB_OUTPUT"
          cat <<EOF > release.txt
          🚀 OpenWrt firmware for XG-040G-MD (openwrt-25.12)
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          设备 ID: ${DEVICE_ID}
          源码仓库: $REPO_URL
          分支: $REPO_BRANCH
          EOF

      - name: 发布 GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧 GitHub Releases
        if: env.UPLOAD_RELEASE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: ${{ env.KEEP_RELEASES }}
          KEEP_RELEASE_MARKER: ${{ env.KEEP_RELEASE_MARKER }}
        run: |
          if [ -f scripts/cleanup-old-releases.sh ]; then
            bash scripts/cleanup-old-releases.sh
          else
            echo "未发现 cleanup-old-releases.sh，跳过"
          fi
