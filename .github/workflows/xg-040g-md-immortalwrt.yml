name: Build_XG_040G_MD-immortal

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: "是否开启 SSH 远程配置 (make menuconfig)"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools python3-dev rsync swig unzip libpython3-dev \
          zlib1g-dev file wget squashfs-tools mkbootimg device-tree-compiler \
          qemu-utils upx-ucl
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          [[ -n "$TZ" ]] && sudo timedatectl set-timezone "$TZ"

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone ImmortalWrt and apply XG-040G-MD patch files
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          cd patch
          # 动态获取内核主版本号 (例如 6.12 或 6.6)
          KVER=$(grep -o 'LINUX_KARCH:=.*' ../openwrt/include/kernel-defaults.mk | cut -d= -f2 || echo "6.12")
          echo "检测到内核版本分支: $KVER"

          mkdir -p ../openwrt/target/linux/airoha/an7581/base-files/etc/board.d/
          mkdir -p ../openwrt/target/linux/airoha/image/
          mkdir -p ../openwrt/target/linux/airoha/dts/
          mkdir -p ../openwrt/target/linux/airoha/patches-$KVER/

          # 拷贝基础文件
          [ -e airoha/01_leds ] && cp -fv airoha/01_leds ../openwrt/target/linux/airoha/an7581/base-files/etc/board.d/01_leds
          [ -e airoha/02_network ] && cp -fv airoha/02_network ../openwrt/target/linux/airoha/an7581/base-files/etc/board.d/02_network
          [ -e airoha/an7581.mk ] && cp -fv airoha/an7581.mk ../openwrt/target/linux/airoha/image/an7581.mk
          [ -e airoha/an7581-nokia_xg-040g-md.dts ] && cp -fv airoha/an7581-nokia_xg-040g-md.dts ../openwrt/target/linux/airoha/dts/an7581-nokia_xg-040g-md.dts
          [ -e airoha/an7581.dtsi ] && cp -fv airoha/an7581.dtsi ../openwrt/target/linux/airoha/dts/an7581.dtsi

          # 拷贝补丁 (适配不同版本文件夹)
          if [ -d "airoha/patches-6.12" ]; then
            find airoha/patches-6.12 -name "*.patch" -exec cp -fv {} ../openwrt/target/linux/airoha/patches-$KVER/ \;
          fi

      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          # 确保 feeds 配置文件存在
          [ -e ../$FEEDS_CONF ] && cp -fv ../$FEEDS_CONF ./feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Run DIY Script (Plugins & Configuration Fix)
        working-directory: ./openwrt
        run: |
          # 载入初始配置
          [ -f "../${CONFIG_FILE}" ] && cp -fv "../${CONFIG_FILE}" .config
          
          # 执行你那个带 devmem 修复的 diy.sh
          chmod +x ../diy.sh
          ../diy.sh

      - name: SSH connection to Actions
        uses: P3TERX/ssh2actions@main
        if: github.event.inputs.ssh == 'true'

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          [[ -n "$DEVICE_NAME" ]] && echo "DEVICE_NAME=_${DEVICE_NAME}" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

          make -j$(nproc) || {
            echo "❌ 编译失败，正在输出详细错误信息..."
            make -j1 V=s
            exit 1
          }
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt_XG-040G-MD${{ env.FILE_DATE }}
          path: openwrt/bin/targets/airoha/*/*

      - name: Publish Release
        uses: ncipollo/release-action@v1
        if: steps.compile.outputs.status == 'success'
        with:
          tag: Build_${{ env.FILE_DATE }}
          artifacts: openwrt/bin/targets/airoha/*/*
          body: |
            🚀 XG-040G-MD 固件构建完成
            内置: CPUFreq, PWM-Airoha, TurboAcc, NPU
            调试: devmem 命令已开启
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
