name: Build XG-040G-MD ImmortalWrt Firmware

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "Build logs"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default-25.12
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ImmortalWrt repository
        uses: actions/checkout@v6

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools python3-dev rsync swig unzip libpython3-dev \
          zlib1g-dev file wget squashfs-tools mkbootimg device-tree-compiler
          sudo apt update
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          if command -v mkbootimg >/dev/null 2>&1; then
            echo "mkbootimg found at: $(command -v mkbootimg)"
          else
            echo "❌ mkbootimg not found in PATH!"
          fi

          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          else
            echo "TZ is not set, skipping timezone setup."
          fi

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone ImmortalWrt source code and apply XG-040G-MD patch files
        run: |
          # 克隆 ImmortalWrt 仓库
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          cd patch
          
          # 拉取 Cairongzeng 的补丁仓库
          git clone --depth 1 https://github.com/Cairongzeng/openwrt.git cairongzeng_patches

          # 创建目标目录（如果不存在）
          mkdir -p openwrt/target/linux/airoha/patches-6.12
          mkdir -p openwrt/target/linux/generic/patches-6.12
          mkdir -p openwrt/target/linux/mediatek/patches-6.12

          # 复制 Cairongzeng 的补丁
          cp -fv cairongzeng_patches/target/linux/airoha/patches-6.12/* openwrt/target/linux/airoha/patches-6.12/
          cp -fv cairongzeng_patches/target/linux/generic/pending-6.12/* openwrt/target/linux/generic/pending-6.12/
          cp -fv cairongzeng_patches/target/linux/mediatek/patches-6.12/* openwrt/target/linux/mediatek/patches-6.12/

          # 拉取你自己仓库的补丁
          git clone --depth 1 https://github.com/kzio111/OpenWrt-for-XG-040G-MD patch_local

          # 复制你自己仓库中的补丁，覆盖 Cairongzeng 的重复补丁
          cp -fv patch_local/patch/01_leds openwrt/target/linux/airoha/an7581/base-files/etc/board.d/01_leds
          cp -fv patch_local/patch/02_network openwrt/target/linux/airoha/an7581/base-files/etc/board.d/02_network
          cp -fv patch_local/patch/an7581.mk openwrt/target/linux/airoha/image/
          cp -fv patch_local/patch/an7581*.dts openwrt/target/linux/airoha/dts/

          cp -fv patch_local/patch/*patch openwrt/target/linux/airoha/patches-6.12/
          cp -fv patch_local/patch/*patch openwrt/target/linux/generic/pending-6.12/
          cp -fv patch_local/patch/*patch openwrt/target/linux/mediatek/patches-6.12/

      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          if [ -e ../$FEEDS_CONF ]; then
            cp -f ../$FEEDS_CONF ./feeds.conf.default
          fi
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: Copy configuration and defconfig
        run: |
          cp -fv "${CONFIG_FILE}" openwrt/.config
          cd openwrt && make defconfig
          [ -e .config ] && cp .config defconfig-final.config

      - name: Upload build config files
        uses: actions/upload-artifact@v6
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j4 V=s
          # Remove small incomplete files <1KB
          find dl -size -1024c -delete

      - name: Compile ImmortalWrt firmware
        id: compile
        run: |
          cd openwrt
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s
          else
            make -j$(nproc)
          fi
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> $GITHUB_ENV
          fi
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v6
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: ImmortalWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 ImmortalWrt firmware for XG-040G-MD
          ----------------------
          设备型号: XG-040G-MD
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核版本: 6.12.X
          源码仓库: $REPO_URL
          分支: $REPO_BRANCH
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
